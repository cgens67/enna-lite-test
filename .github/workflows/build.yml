name: Build APK

  on:
    push:
      branches: [ main, master ]
    pull_request:
      branches: [ main, master ]
    workflow_dispatch:

  jobs:
    build:
      runs-on: ubuntu-latest

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4

        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'

        - name: Install Android SDK platform 37
          run: |
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
              "platforms;android-37" \
              "build-tools;35.0.0" \
              "platform-tools" 2>/dev/null | tail -5

        - name: Cache Gradle packages
          uses: actions/cache@v4
          with:
            path: |
              ~/.gradle/caches
              ~/.gradle/wrapper
            key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
            restore-keys: |
              ${{ runner.os }}-gradle-

        - name: Make gradlew executable
          run: chmod +x ./gradlew

        - name: Build Debug APK
          run: ./gradlew assembleDebug --stacktrace

        - name: Upload Debug APK
          uses: actions/upload-artifact@v4
          with:
            name: enna-lite-debug-${{ github.run_number }}
            path: app/build/outputs/apk/debug/*.apk
            if-no-files-found: error

        # Release build — only on push (not PRs), and only when secrets are configured
        - name: Decode signing keystore
          if: github.event_name != 'pull_request' && env.KEYSTORE_BASE64 != ''
          env:
            KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

        - name: Build Release APK
          if: github.event_name != 'pull_request'
          env:
            KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
            KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
            KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
            KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          run: |
            if [ -f keystore.jks ]; then
              ./gradlew assembleRelease \
                -Pandroid.injected.signing.store.file=$(pwd)/keystore.jks \
                -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD" \
                -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
                -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
            else
              echo "No keystore configured — building unsigned release APK"
              ./gradlew assembleRelease
            fi

        - name: Upload Release APK
          if: github.event_name != 'pull_request'
          uses: actions/upload-artifact@v4
          with:
            name: enna-lite-release-${{ github.run_number }}
            path: app/build/outputs/apk/release/*.apk
            if-no-files-found: warn
  